<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛩 회계 플라이트 — 장부조회 마스터</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cy:#00f2ff; --pk:#ff2d78; --gd:#ffd600;
  --gn:#39ff14; --pu:#b44fff; --bg:#020810;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;overflow:hidden;user-select:none}
canvas{display:block;position:absolute;top:0;left:0;z-index:1}

/* ── HUD ── */
#hud{
  position:absolute;top:0;left:0;width:100%;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:18px 24px;pointer-events:none;
}
.hb{display:flex;flex-direction:column;align-items:center;gap:3px}
.hl{font-family:'Orbitron',monospace;font-size:.72rem;color:rgba(0,242,255,.5);letter-spacing:3px;text-transform:uppercase}
.hv{font-family:'Orbitron',monospace;font-size:2.1rem;font-weight:900;color:#fff;text-shadow:0 0 14px var(--cy);line-height:1}
#hv-score{color:var(--gd);text-shadow:0 0 14px var(--gd)}
#hv-combo{color:var(--gn);text-shadow:0 0 14px var(--gn)}
.irow{display:flex;gap:18px;align-items:center;margin-top:6px}
.iic{font-size:1.45rem;opacity:0;transition:opacity .3s;filter:drop-shadow(0 0 8px #fff)}
.iic.on{opacity:1;animation:icP .55s infinite alternate}
@keyframes icP{from{transform:scale(.9)}to{transform:scale(1.2)}}

/* ── 게이트 DOM 레이어 ── */
#glayer{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:12;overflow:hidden
}
.gatel{position:absolute;left:0;width:100%;display:flex;flex-direction:column;align-items:center}
.gbar{
  width:100%;height:20px;
  background:linear-gradient(90deg,transparent 0%,rgba(15,25,100,.9) 18%,rgba(20,35,130,.95) 50%,rgba(15,25,100,.9) 82%,transparent 100%);
  border-top:1.5px solid rgba(0,242,255,.22);
  border-bottom:1.5px solid rgba(0,242,255,.22);
  box-shadow:0 0 20px rgba(0,242,255,.12)
}
.ginfo{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 0 0}
.gq{
  font-size:1.4rem;font-weight:900;color:#eef0ff;text-align:center;
  text-shadow:0 2px 10px rgba(0,0,0,.95),0 0 6px rgba(0,0,0,.8);
  max-width:700px;line-height:1.45;
  background:rgba(2,8,20,.72);padding:9px 30px;
  border-radius:14px;border:1px solid rgba(255,255,255,.1)
}
.gk{
  font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:var(--gd);
  text-shadow:0 0 14px rgba(255,214,0,.75),0 2px 8px rgba(0,0,0,.9);
  animation:kP 1s infinite alternate
}
@keyframes kP{from{transform:scale(1);text-shadow:0 0 10px rgba(255,214,0,.6)}
              to{transform:scale(1.05);text-shadow:0 0 22px rgba(255,214,0,.95)}}
.gchoices{
  position:relative;display:flex;justify-content:space-between;
  width:100%;padding:0 80px;top:-70px
}
.gchoice{
  font-family:'Black Han Sans',sans-serif;font-size:1.4rem;
  padding:11px 34px;border-radius:50px;border:2.5px solid;backdrop-filter:blur(4px)
}
.gchoice.left{color:var(--pk);border-color:var(--pk);background:rgba(255,45,120,.1);
              text-shadow:0 0 10px var(--pk);box-shadow:0 0 18px rgba(255,45,120,.2)}
.gchoice.right{color:var(--gn);border-color:var(--gn);background:rgba(57,255,20,.07);
               text-shadow:0 0 10px var(--gn);box-shadow:0 0 18px rgba(57,255,20,.14)}

/* ── 플래시 & 콤보 ── */
#flash{position:absolute;inset:0;z-index:30;pointer-events:none;opacity:0}
#flash.ok {background:rgba(57,255,20,.1); animation:fl .4s ease-out forwards}
#flash.bad{background:rgba(255,45,120,.2);animation:fl .55s ease-out forwards}
@keyframes fl{0%{opacity:1}100%{opacity:0}}
#cpop{
  position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron';font-size:3rem;font-weight:900;
  color:var(--gd);pointer-events:none;z-index:50;display:none;
  text-shadow:0 0 20px var(--gd),2px 2px 0 #000
}
@keyframes cp{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
  40%{opacity:1;transform:translate(-50%,-68%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-115%) scale(1)}
}

/* ── 오버레이 공통 ── */
.ovl{
  position:absolute;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px
}

/* ── 시작 화면 ── */
#ss{background:radial-gradient(ellipse at 50% 38%,#071530 0%,#020912 65%)}
.logo{
  font-family:'Orbitron',monospace;font-size:3.5rem;font-weight:900;
  color:var(--cy);letter-spacing:5px;text-align:center;
  text-shadow:0 0 32px var(--cy),0 0 64px rgba(0,242,255,.22)
}
.sub{font-family:'Black Han Sans';font-size:1.15rem;color:rgba(255,255,255,.42);letter-spacing:4px}
.ggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:90%;max-width:760px;}
.gc{
  background:rgba(255,255,255,.04);border:1px solid rgba(0,242,255,.18);
  border-radius:14px;padding:16px 20px;font-size:0.95rem;
  color:rgba(255,255,255,.65);line-height:1.6
}
.gc strong{color:#fff;display:block;font-size:1.02rem;margin-bottom:5px}
.gc.a{border-left:3px solid var(--cy)}
.gc.b{border-left:3px solid var(--pk)}
.gc.c{border-left:3px solid var(--gd)}
.sbtn{
  padding:16px 60px;background:transparent;border:3px solid var(--cy);border-radius:50px;
  cursor:pointer;font-family:'Black Han Sans';font-size:1.6rem;color:var(--cy);
  letter-spacing:2px;text-shadow:0 0 12px var(--cy);
  box-shadow:0 0 30px rgba(0,242,255,.25),inset 0 0 20px rgba(0,242,255,.05);
  transition:all .2s;animation:sbP 2s infinite
}
.sbtn:hover{background:var(--cy);color:#000;text-shadow:none;box-shadow:0 0 52px rgba(0,242,255,.65);transform:scale(1.05);animation:none}
@keyframes sbP{0%,100%{box-shadow:0 0 26px rgba(0,242,255,.25),inset 0 0 20px rgba(0,242,255,.05)}
               50%{box-shadow:0 0 46px rgba(0,242,255,.45),inset 0 0 26px rgba(0,242,255,.1)}}

/* ── 게임오버 화면 ── */
#gs{background:rgba(2,8,20,.93);backdrop-filter:blur(10px);display:none}
.gtitle{
  font-family:'Orbitron';font-size:3.5rem;font-weight:900;
  color:var(--pk);letter-spacing:6px;text-shadow:0 0 30px var(--pk)
}
.gscore{
  font-family:'Orbitron';font-size:4.2rem;font-weight:900;
  color:var(--gd);text-shadow:0 0 22px var(--gd);line-height:1
}
.ggrade{
  font-family:'Black Han Sans';font-size:1.2rem;color:var(--cy);
  background:rgba(0,242,255,.1);padding:8px 28px;
  border-radius:50px;border:1px solid rgba(0,242,255,.3)
}
.gstats{
  display:flex;gap:32px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:14px 32px;font-size:0.95rem;color:rgba(255,255,255,.5)
}
.gstats span{color:#fff;font-weight:700}
#savesec{display:flex;flex-direction:column;align-items:center;gap:12px}
#savesec label{font-size:.95rem;color:rgba(0,242,255,.7);letter-spacing:1px}
#pname{
  padding:10px 20px;background:rgba(0,242,255,.07);
  border:2px solid rgba(0,242,255,.35);border-radius:12px;
  color:#fff;font-size:1.1rem;text-align:center;
  font-family:'Noto Sans KR';width:200px;outline:none;transition:border-color .2s
}
#pname:focus{border-color:var(--cy);box-shadow:0 0 14px rgba(0,242,255,.3)}
#pname::placeholder{color:rgba(255,255,255,.28)}
#savemsg{font-size:.85rem;color:rgba(255,255,255,.4);height:16px}
#rkbox{
  width:90%;max-width:500px;background:rgba(255,255,255,.04);
  border:1px solid rgba(0,242,255,.2);border-radius:16px;
  padding:4px 0;max-height:220px;overflow-y:auto;display:none
}
#rkbox::-webkit-scrollbar{width:4px}
#rkbox::-webkit-scrollbar-thumb{background:rgba(0,242,255,.3);border-radius:2px}
.rkhdr{text-align:center;padding:10px 0 6px;font-family:'Orbitron';font-size:.78rem;color:rgba(0,242,255,.42);letter-spacing:3px}
.rkrow{
  display:grid;grid-template-columns:54px 1fr 130px 80px;
  padding:10px 22px;gap:8px;border-bottom:1px solid rgba(255,255,255,.06);
  align-items:center;font-size:.9rem
}
.rkrow:last-child{border-bottom:none}
.rkn{font-family:'Orbitron';font-size:.88rem;color:rgba(255,255,255,.3)}
.rkn.top{color:var(--gd)}
.rknm{font-weight:700;color:#fff}
.rkgr{font-size:0.85rem;color:var(--gn);text-align:center;}
.rksc{color:var(--gd);font-weight:700;text-align:right;font-family:'Orbitron';font-size:.85rem}
.rkme{background:rgba(0,242,255,.07)}
.spinrow{display:flex;align-items:center;justify-content:center;gap:10px;padding:22px;color:rgba(255,255,255,.3);font-size:.9rem}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.12);border-top-color:var(--cy);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.brow{display:flex;gap:14px}
.pill{padding:12px 36px;border:2px solid;border-radius:50px;font-family:'Black Han Sans';font-size:1.1rem;cursor:pointer;transition:all .18s}
.pill.cy{color:var(--cy);border-color:var(--cy);background:transparent}
.pill.cy:hover{background:var(--cy);color:#000;box-shadow:0 0 22px rgba(0,242,255,.5)}
.pill.gn{color:var(--gn);border-color:var(--gn);background:transparent}
.pill.gn:hover{background:var(--gn);color:#000;box-shadow:0 0 22px rgba(57,255,20,.4)}
</style>
</head>

      <div class="gc b"><strong>⚡ 특수 아이템</strong>🛡️ 방어막 — 오답 1회 보호<br>🧲 자석 — 코인 자동 흡입<br>💰 코인 — +100점</div>

    </div>

  </div>

</div> <script>

const SHEET_URL = "https://script.google.com/macros/s/AKfycby-N01s4e5gHHCRZal52CODVHBNYPRPr9aWORp4mMsxsSnwOxQINcOCoHYuVlE2Y652/exec";

const Problems = [

const SFX = {
  ctx:null,
  init(){this.ctx=new(window.AudioContext||window.webkitAudioContext)()},
  tone(f,t,d,v=0.12){
    if(!this.ctx)return;
    if(this.ctx.state==='suspended')this.ctx.resume();
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=t;o.frequency.setValueAtTime(f,this.ctx.currentTime);
    g.gain.setValueAtTime(v,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);
    o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d);
  },
  ok()  {this.tone(660,'sine',.08,.2);setTimeout(()=>this.tone(990,'sine',.15,.2),60)},
  bad() {this.tone(140,'sawtooth',.45,.4)},
  coin(){this.tone(1200+Math.random()*400,'triangle',.05,.06)},
  item(){this.tone(600,'square',.08,.1);setTimeout(()=>this.tone(1200,'square',.15,.1),90)},
};

class Particle{
  constructor(x,y,col){
    this.x=x;this.y=y;this.col=col;
    const a=Math.random()*Math.PI*2,s=3+Math.random()*10;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.life=1;this.fade=.025+Math.random()*.04;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.18;this.life-=this.fade}
  draw(ctx){
    ctx.globalAlpha=Math.max(0,this.life);
    ctx.fillStyle=this.col;
    ctx.beginPath();ctx.arc(this.x,this.y,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

const Game={
  canvas:null,ctx:null,w:0,h:0,
  state:'idle',
  score:0,hi:0,combo:0,maxCombo:0,okCount:0,
  speed:0,frame:0,
  player:{x:0,y:0,r:42,shield:false,magnet:false,magT:0},
  gates:[],items:[],parts:[],stars:[],

  shipImg: null, 
  shipImgLoaded: false,

  init(){
    this.canvas=document.getElementById('canvas');
    this.ctx=this.canvas.getContext('2d');
    this.hi=+localStorage.getItem('hub_flight_hi')||0;
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    
    // 마우스 이벤트: 중앙 정렬된 래퍼(canvas-wrap) 안에서의 상대 좌표로 보정
    window.addEventListener('mousemove',e=>{
      if(this.state==='playing') {
        const rect = document.getElementById('canvas-wrap').getBoundingClientRect();
        this.player.x=Math.max(55,Math.min(this.w-55, e.clientX - rect.left));
      }
    });
    window.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(this.state==='playing') {
        const rect = document.getElementById('canvas-wrap').getBoundingClientRect();
        this.player.x=Math.max(55,Math.min(this.w-55, e.touches[0].clientX - rect.left));
      }
    },{passive:false});
    
    window.addEventListener('keydown',e=>{
      if(this.state==='playing'){
        if(e.key==='ArrowLeft')  this.player.x=Math.max(55,this.player.x-65);
        if(e.key==='ArrowRight') this.player.x=Math.min(this.w-55,this.player.x+65);
      }
    });

    this.shipImg = new Image();
    this.shipImg.src = "airplane.png";
    this.shipImg.onload = () => { this.shipImgLoaded = true; };

    for(let i=0;i<100;i++)this.stars.push(this.mkStar(true));
    this.loop();
  },

  resize(){
    const wrap = document.getElementById('canvas-wrap');
    this.w = this.canvas.width = wrap.clientWidth;
    this.h = this.canvas.height = window.innerHeight;
    this.player.y = this.h - 140;
    if(this.state==='idle')this.player.x=this.w/2;
  },
  mkStar(init=false){
    return{x:Math.random()*this.w,y:init?Math.random()*this.h:-2,s:Math.random()*2+.3,v:Math.random()*14+4,c:Math.random()>.85?'#00f2ff':Math.random()>.7?'#b44fff':'#fff'};
  },
  start(){SFX.init();document.getElementById('ss').style.display='none';this._reset();},
  restart(){document.getElementById('gs').style.display='none';this._reset();},
  _reset(){
    this.state='playing';this.score=0;this.combo=0;this.maxCombo=0;this.okCount=0;this.speed=3.0;this.frame=0;this.gates=[];this.items=[];this.parts=[];this.player.shield=false;this.player.magnet=false;this.player.magT=0;document.getElementById('ic-shield').classList.remove('on');document.getElementById('ic-magnet').classList.remove('on');document.getElementById('glayer').innerHTML='';document.getElementById('savesec').style.display='flex';document.getElementById('rkbox').style.display='none';document.getElementById('rkbox').innerHTML='';document.getElementById('pname').value='';document.getElementById('savemsg').textContent='';const sb=document.getElementById('savebtn');sb.disabled=false;sb.style.opacity='1';this.updHUD();
  },
  loop(){this.update();this.draw();requestAnimationFrame(()=>this.loop())},
  spawnGate(){const p=Problems[Math.floor(Math.random()*Problems.length)];const id='g'+Date.now()+'_'+Math.random().toString(36).slice(2);const g={id,y:-430,q:p.q,k:p.key,lText:p.L,rText:p.R,ans:p.a,passed:false,domEl:null};const layer=document.getElementById('glayer');const el=document.createElement('div');el.id=id; el.className='gatel'; el.style.top='-600px';el.innerHTML=`<div class="gbar"></div><div class="ginfo"><div class="gq">${p.q}</div><div class="gk">💡 ${p.key}</div></div><div class="gchoices"><div class="gchoice left">${p.L}</div><div class="gchoice right">${p.R}</div></div>`;layer.appendChild(el);g.domEl=el;this.gates.push(g);},
  spawnItems(){const pat=Math.floor(Math.random()*5);const sx=80+Math.random()*(this.w-160);if(pat===0)for(let i=0;i<5;i++)this.mkItem(sx+(i-2)*55,-60,'coin');else if(pat===1)for(let i=0;i<5;i++)this.mkItem(sx,-60-i*68,'coin');else if(pat===2){this.mkItem(sx,-60,'coin');this.mkItem(sx-55,-130,'coin');this.mkItem(sx+55,-130,'coin')}else if(pat===3)for(let i=0;i<3;i++)this.mkItem(sx+(i-1)*80,-60,'coin');else this.mkItem(50+Math.random()*(this.w-100),-60,Math.random()>.5?'shield':'magnet');},
  mkItem(x,y,type){this.items.push({x,y,type,r:type==='coin'?20:28})},
  update(){
    if(this.state!=='playing')return;this.frame++;this.speed=Math.min(8.5,3.0+this.frame*.0009);this.stars.forEach(s=>{s.y+=s.v*(this.speed*.17);if(s.y>this.h)Object.assign(s,this.mkStar());});const gI=Math.max(65,Math.floor(1500/this.speed));if(this.frame%gI===0)this.spawnGate();if(this.frame%52===0)this.spawnItems();if(this.player.magnet){this.player.magT--;if(this.player.magT<=0){this.player.magnet=false;document.getElementById('ic-magnet').classList.remove('on');}}
    
    // 게이트 판정 로직
    for(let i=this.gates.length-1;i>=0;i--){
      const g=this.gates[i];
      g.y+=this.speed*.82;
      if(g.domEl) g.domEl.style.top=(g.y-140)+'px';
      
      // 판정선 개선: 비행기 위치(this.player.y)에 완전히 선(g.y)이 닿는 순간 1회만 판정
      if(!g.passed && g.y >= this.player.y - 10){
        const side=this.player.x<this.w/2?'L':'R';
        g.passed=true;
        if(g.domEl)g.domEl.style.opacity='.15';
        
        if(side===g.ans){
          this.combo++;
          if(this.combo>this.maxCombo)this.maxCombo=this.combo;
          this.score+=500+(this.combo-1)*50;
          this.okCount++;SFX.ok();
          this.burst(this.player.x,this.player.y,'#00f2ff',18);
          this.burst(this.player.x,this.player.y,'#fff',8);
          if(this.combo>=2)this.showCombo(this.combo);
          this.doFlash('ok');
        } else {
          if(this.player.shield){
            this.player.shield=false;document.getElementById('ic-shield').classList.remove('on');SFX.item();
            this.burst(this.player.x,this.player.y,'#00f2ff',14);
          } else {
            SFX.bad();this.doFlash('bad');
            this.burst(this.player.x,this.player.y,'#ff2d78',28);
            this.state='dying';setTimeout(()=>this.gameOver(),420);
          }
          this.combo=0;
        }
        this.updHUD();
      }
    }
    
    for(let i=this.items.length-1;i>=0;i--){const it=this.items[i];it.y+=this.speed*1.12;if(this.player.magnet&&it.type==='coin'){const dx=this.player.x-it.x,dy=this.player.y-it.y;if(Math.sqrt(dx*dx+dy*dy)<290){it.x+=dx*.13;it.y+=dy*.13}}const dx=this.player.x-it.x,dy=this.player.y-it.y;if(Math.sqrt(dx*dx+dy*dy)<this.player.r+it.r){if(it.type==='coin'){this.score+=100;SFX.coin();this.burst(it.x,it.y,'#ffd600',5)}else if(it.type==='shield'){this.player.shield=true;SFX.item();document.getElementById('ic-shield').classList.add('on');this.burst(it.x,it.y,'#00f2ff',10)}else{this.player.magnet=true;this.player.magT=480;SFX.item();document.getElementById('ic-magnet').classList.add('on');this.burst(it.x,it.y,'#ff0055',10)}this.items.splice(i,1);this.updHUD();} else if(it.y>this.h+60)this.items.splice(i,1);}
    for(let i=this.parts.length-1;i>=0;i--){this.parts[i].update();if(this.parts[i].life<=0)this.parts.splice(i,1);}
  },
  draw(){
    const ctx=this.ctx;const bg=ctx.createLinearGradient(0,0,0,this.h);bg.addColorStop(0,'transparent');bg.addColorStop(1,'#030c1c');ctx.fillStyle=bg;ctx.fillRect(0,0,this.w,this.h);
    ctx.save();const nb=ctx.createRadialGradient(this.w*.3,this.h*.5,0,this.w*.3,this.h*.5,this.w*.45);nb.addColorStop(0,'rgba(28,0,65,.07)');nb.addColorStop(1,'transparent');ctx.fillStyle=nb;ctx.fillRect(0,0,this.w,this.h);ctx.restore();
    this.stars.forEach(s=>{ctx.shadowColor=s.c;ctx.shadowBlur=s.s*3;ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();});ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,242,255,.1)';ctx.lineWidth=2;ctx.setLineDash([28,28]);const dOff=(this.frame*this.speed*.7)%56;ctx.beginPath();ctx.moveTo(this.w/2,-dOff);ctx.lineTo(this.w/2,this.h);ctx.stroke();ctx.setLineDash([]);
    this.items.forEach(it=>{if(it.type==='coin'){ctx.save();ctx.translate(it.x,it.y);ctx.scale(Math.abs(Math.cos(this.frame*.08)),1);ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='#b8860b';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#7a5000';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('₩',0,1);ctx.restore();} else {ctx.font='30px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#fff';ctx.shadowBlur=16;ctx.fillText(it.type==='shield'?'🛡️':'🧲',it.x,it.y);ctx.shadowBlur=0;}});
    this.parts.forEach(p=>p.draw(ctx));this.drawShip();
  },
  burst(x,y,col,n){for(let i=0;i<n;i++)this.parts.push(new Particle(x,y,col))},
  doFlash(type){const el=document.getElementById('flash');el.className='';void el.offsetWidth;el.className=type;setTimeout(()=>el.className='',type==='ok'?400:560);},
  showCombo(n){const el=document.getElementById('cpop');el.textContent=n+'x COMBO! 🔥';el.style.display='block';el.style.animation='none';void el.offsetWidth;el.style.animation='cp .8s ease-out forwards';setTimeout(()=>el.style.display='none',800);},
  updHUD(){document.getElementById('hv-score').textContent=this.score.toLocaleString();document.getElementById('hv-combo').textContent=this.combo+'x';},
  
  _grade(score){
    if(score>=10000) return '👑 전설의 에이스';
    if(score>=6000)  return '🥇 베테랑 파일럿';
    if(score>=3000)  return '🥈 숙련 파일럿';
    if(score>=1000)  return '🥉 정규 파일럿';
    return '🛩 견습 파일럿';
  },

  gameOver(){
    this.state='gameover';
    if(this.score>this.hi){this.hi=this.score;localStorage.setItem('hub_flight_hi',this.hi)}
    document.getElementById('glayer').innerHTML='';
    document.getElementById('go-score').textContent=this.score.toLocaleString()+'점';
    document.getElementById('go-ok').textContent=this.okCount;
    document.getElementById('go-mc').textContent=this.maxCombo;
    document.getElementById('go-hi').textContent=this.hi.toLocaleString();
    
    const grade = this._grade(this.score);
    document.getElementById('go-grade').textContent='파일럿 등급: '+grade;
    
    document.getElementById('gs').style.display='flex';
    this.loadRanking();
  },

  async saveScore(){
    const name=document.getElementById('pname').value.trim().toUpperCase();
    if(!name){alert('이니셜을 입력하세요 (예: KMJ)');return}
    if(name.length<2){alert('2글자 이상 입력하세요');return}
    const btn=document.getElementById('savebtn');
    const msg=document.getElementById('savemsg');
    btn.disabled=true;btn.style.opacity='.5';
    msg.textContent='저장 중...';msg.style.color='rgba(255,255,255,.4)';
    
    const today=new Date().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'});
    const gradeText = this._grade(this.score);
    const data={name, score:this.score, combo:this.maxCombo, correct:this.okCount, date:today, game:GAME_ID, grade:gradeText};
    
    if(!SHEET_URL||SHEET_URL==='YOUR_UNIFIED_GAS_URL_HERE'){
      this._lsave(data);
      msg.textContent='✓ 로컬 저장 완료 (Google Sheets 미연결)';msg.style.color='var(--gd)';
      this.loadRanking();return;
    }
    try{
      await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      this._lsave(data);
      msg.textContent='✓ 저장 완료! 랭킹에 반영됩니다';msg.style.color='#39ff14';
      await new Promise(r => setTimeout(r, 800));
      await this.loadRanking();
    }catch(e){
      this._lsave(data);
      msg.textContent='✓ 로컬 저장 완료 (네트워크 오류)';msg.style.color='var(--gd)';
      this.loadRanking();
    }
  },
  _lsave(d){
    const l=this._lget();l.push(d);l.sort((a,b)=>b.score-a.score);
    localStorage.setItem('hub_flight_rank',JSON.stringify(l.slice(0,15)));
  },
  _lget(){return JSON.parse(localStorage.getItem('hub_flight_rank')||'[]')},
  
  async loadRanking(){
    const box=document.getElementById('rkbox');
    box.style.display='block';
    if(!SHEET_URL||SHEET_URL==='YOUR_UNIFIED_GAS_URL_HERE'){this._render(this._lget());return;}
    box.innerHTML='<div class="spinrow"><div class="spinner"></div> 불러오는 중...</div>';
    try{
      const res=await fetch(SHEET_URL+'?action=get&game='+GAME_ID);
      this._render(this._merge(await res.json(),this._lget()));
    }catch(e){this._render(this._lget())}
  },
  _merge(remote,local){
    const map=new Map();
    [...(Array.isArray(remote)?remote:[]),...local].forEach(r=>{
      const k=r.name+'_'+r.score;if(!map.has(k))map.set(k,r);
    });
    return[...map.values()].sort((a,b)=>b.score-a.score).slice(0,15);
  },
  _render(list){
    const box=document.getElementById('rkbox');
    if(!list||!list.length){
      box.innerHTML='<div style="text-align:center;padding:20px;color:rgba(255,255,255,.3)">아직 기록이 없습니다</div>';
      return;
    }
    const me=document.getElementById('pname').value.trim().toUpperCase();
    box.innerHTML='<div class="rkhdr">🏆 HALL OF FAME</div>'+
      list.map((r,i)=>{
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'위';
        const gText = r.grade || this._grade(r.score);
        return`<div class="rkrow ${r.name===me?'rkme':''}">
  <div class="rkn ${i<3?'top':''}">${medal}</div><div class="rknm">${r.name}</div><div class="rkgr">${gText}</div><div class="rksc">${(r.score||0).toLocaleString()}</div></div>`;
      }).join('');
  },

  drawShip(){
    const ctx = this.ctx, px = this.player.x, py = this.player.y;
    ctx.save(); ctx.translate(px, py);

    if (this.player.magnet) {
      ctx.beginPath(); ctx.arc(0, 0, 290, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,0,85,${.08 + Math.sin(this.frame * .14) * .04})`;
      ctx.lineWidth = 2; ctx.stroke();
    }
    const hv = Math.sin(this.frame * .08) * 4; ctx.translate(0, hv);

    const fl = ctx.createLinearGradient(0, 38, 0, 75);
    fl.addColorStop(0, '#00f2ff'); fl.addColorStop(.45, 'rgba(0,130,255,.55)'); fl.addColorStop(1, 'transparent');
    ctx.fillStyle = fl;
    ctx.beginPath();
    ctx.moveTo(-8, 45); ctx.lineTo(0, 80 + Math.random() * 16); ctx.lineTo(8, 45); ctx.fill();

    if (this.shipImgLoaded) {
      ctx.drawImage(this.shipImg, -50, -50, 100, 100);
    }

    if (this.player.shield) {
      ctx.strokeStyle = `rgba(0,242,255,${.65 + Math.sin(this.frame * .1) * .3})`;
      ctx.lineWidth = 3; ctx.shadowColor = '#00f2ff'; ctx.shadowBlur = 22;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const ang = Math.PI / 3 * i + this.frame * .04, r = 76;
        i === 0 ? ctx.moveTo(r * Math.cos(ang), r * Math.sin(ang)) : ctx.lineTo(r * Math.cos(ang), r * Math.sin(ang));
      }
      ctx.closePath(); ctx.stroke(); ctx.shadowBlur = 0;
    }
    ctx.restore();
  },
};

window.addEventListener('load',()=>Game.init());
</script>
